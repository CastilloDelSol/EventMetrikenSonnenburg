<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jahresübersicht</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }
    header {
      background: #111;
      color: #fff;
      padding: 2rem;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem;
    }
    .nav {
      margin-bottom: 1rem;
    }
    .nav a {
      color: #005bbb;
      text-decoration: none;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card a {
      text-decoration: none;
      color: #111;
      font-weight: bold;
      font-size: 1.05rem;
    }
    .muted {
      color: #666;
      margin-top: 0.5rem;
    }
    .error {
      background: #ffeaea;
      color: #8a0000;
      padding: 1rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1 id="title">Lade Jahr...</h1>
    <p id="description"></p>
  </header>

  <main>
    <div class="nav">
      <a href="../">← Zurück zur Event-Übersicht</a>
    </div>

    <h2>Rennen</h2>
    <div id="races" class="grid"></div>
    <div id="error"></div>
  </main>

  <script>
    async function init() {
      const titleEl = document.getElementById("title");
      const descEl = document.getElementById("description");
      const racesEl = document.getElementById("races");
      const errorEl = document.getElementById("error");

      try {
        const res = await fetch("./year.json");
        if (!res.ok) throw new Error("year.json konnte nicht geladen werden.");

        const data = await res.json();

        titleEl.textContent = data.title || `${data.eventId} - ${data.year}`;
        descEl.textContent = data.description || "";

        racesEl.innerHTML = "";

        (data.races || []).forEach((race) => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <a href="../race.html?year=${encodeURIComponent(data.year)}&race=${encodeURIComponent(race.raceId)}">
              ${race.name}
            </a>
            <div class="muted">Race ID: ${race.raceId}</div>
          `;
          racesEl.appendChild(card);
        });
      } catch (err) {
        errorEl.innerHTML = `<div class="error">${err.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
